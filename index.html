<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вкусовилл — AI Агент</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>Вкусовилл AI</h1>
            <button id="newCartBtn" class="btn-new-cart" title="Начать новую корзину">Новая корзина</button>
        </header>

        <div id="chatArea" class="chat-area">
            <div class="welcome">
                Привет! Я помогу собрать корзину покупок. Напишите, что ищете.
            </div>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="messageInput"
                class="message-input"
                placeholder="Напишите сообщение..."
                autocomplete="off"
            />
            <button id="sendBtn" class="btn-send" title="Отправить">&#10148;</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
